<script>
    // 1. Khai báo biến toàn cục
    let vocabularyDB = []; 
    let learnedWords = JSON.parse(localStorage.getItem('learnedWords')) || [];
    let currentSessionWords = [];
    let currentIndex = 0;

    // 2. Hàm tải dữ liệu từ file JSON ngoài
    async function loadVocabulary() {
        try {
            const statsElement = document.getElementById('stats');
            if (statsElement) {
                statsElement.innerText = "Đang tải dữ liệu từ file JSON...";
            }
            
            const response = await fetch('vocab_data.json');
            if (!response.ok) {
                throw new Error('Không thể tải file vocab_data.json. Hãy kiểm tra lại tên file.');
            }
            
            const rawData = await response.json();
            
            // CHUYỂN ĐỔI: Biến Object (0: {}, 1: {}) thành Mảng ([{}, {}])
            vocabularyDB = Object.values(rawData);
            
            // Sau khi tải xong dữ liệu mới bắt đầu phiên học
            startNewSession();
            
        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);
            const statsElement = document.getElementById('stats');
            if (statsElement) {
                statsElement.innerHTML = `
                    <b style="color:red;">Lỗi: ${error.message}</b><br>
                    <small>Lưu ý: Bạn cần chạy qua Live Server (VS Code) hoặc GitHub Pages để trình duyệt cho phép đọc file JSON.</small>
                `;
            }
        }
    }

    // 3. Hàm bắt đầu phiên học 10 từ mới
    function startNewSession() {
        if (vocabularyDB.length === 0) return;

        // Lọc các từ chưa thuộc
        const unlearned = vocabularyDB.filter(item => !learnedWords.includes(item.word));
        
        if (unlearned.length === 0 && vocabularyDB.length > 0) {
            alert("Chúc mừng! Bạn đã thuộc toàn bộ từ vựng. Hệ thống sẽ reset lại từ đầu.");
            resetData(true); // Tự động reset không cần hỏi nếu đã hết từ
            return;
        }

        // Lấy ngẫu nhiên 10 từ từ danh sách chưa học
        currentSessionWords = unlearned.sort(() => 0.5 - Math.random()).slice(0, 10);
        currentIndex = 0;
        
        document.getElementById('complete-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        
        updateStats();
        showCard();
    }

    // 4. Hàm hiển thị dữ liệu lên Flashcard
    function showCard() {
        const card = document.getElementById('card');
        if (card) card.classList.remove('is-flipped');
        
        const wordData = currentSessionWords[currentIndex];
        
        // Cập nhật các trường thông tin khớp với file JSON mới của bạn
        setText('f-word', wordData.word);
        setText('f-ipa', wordData.phon_br || wordData.phon_n_am || ""); // Ưu tiên giọng Anh (br)
        setText('f-type', wordData.type);
        setText('f-meaning', wordData.definition); // definition thay cho meaning
        setText('f-example', `Ví dụ: ${wordData.example}`);
    }

    // Hàm phụ trợ để gán text an toàn (tránh lỗi null)
    function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.innerText = value;
    }

    // 5. Các hàm điều khiển (Lật, Tiếp theo, Đã học)
    function flipCard() {
        const card = document.getElementById('card');
        if (card) card.classList.toggle('is-flipped');
    }

    function nextCard() {
        currentIndex++;
        if (currentIndex < currentSessionWords.length) {
            showCard();
        } else {
            endSession();
        }
        updateStats();
    }

    function markAsLearned() {
        const word = currentSessionWords[currentIndex].word;
        if (!learnedWords.includes(word)) {
            learnedWords.push(word);
            localStorage.setItem('learnedWords', JSON.stringify(learnedWords));
        }
        nextCard();
    }

    function endSession() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('complete-area').style.display = 'block';
    }

    // 6. Cập nhật thống kê
    function updateStats() {
        const total = vocabularyDB.length;
        const learned = learnedWords.length;
        const remainingInSession = currentSessionWords.length - currentIndex;
        
        const statsElement = document.getElementById('stats');
        if (statsElement) {
            statsElement.innerText = `Đã thuộc: ${learned}/${total} từ | Lượt này còn: ${remainingInSession} từ`;
        }
    }

    // 7. Reset dữ liệu
    function resetData(silent = false) {
        if (silent || confirm("Bạn có chắc chắn muốn xóa hết lịch sử đã học không?")) {
            localStorage.removeItem('learnedWords');
            learnedWords = [];
            location.reload();
        }
    }

    // KHỞI CHẠY KHI TRANG WEB VỪA MỞ
    window.onload = loadVocabulary;
</script>
